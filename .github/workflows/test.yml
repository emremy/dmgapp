name: Test on macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-15-intel
        node-version:
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show system info
        run: |
          sw_vers
          uname -m
          node -v
          npm -v

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
